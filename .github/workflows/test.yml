name: Test

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rendering dependencies
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg python3-pil
      - name: Run smoke test
        run: ./tests/smoke-test.sh
