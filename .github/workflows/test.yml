name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install rendering dependencies
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg
      - name: Install OneCut
        run: python -m pip install '.[test]'
      - name: Run unit tests
        run: pytest
      - name: Run smoke test
        run: ./tests/smoke-test.sh
